[profile.default]
src = "src"
out = "out"
libs = ["node_modules", "lib"]
test = "test/foundry"
cache_path = "cache_forge"
solc = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
]

[fuzz]
runs = 1000

[invariant]
runs = 256
depth = 15
